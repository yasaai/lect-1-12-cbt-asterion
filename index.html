          "Preeklampsia berat",
          "Preeklamsia Ringan",
          "Hipertensi Gestasional",
          "Superimposed preeklampsia"
        ],
        answer: 1,
        explain: "TD tinggi + proteinuria."
      },
      {
        q: "92. Bila 15 menit setelah bayi lahir dan sudah dilakukan penatalaksanaan aktif persalinan kala tiga plasenta belum lahir, maka tindakan yang pertama kali anda lakukan adalah:",
        options: [
          "Memeriksa tanda-tanda vital, mulai memasang infus dan merujuk.",
          "Melakukan masase fundus dan meminta ibu untuk meneran.",
          "Lahirkan plasenta secara manual.",
          "Memberikan 10 unit oksitosin intramuskular",
          "Memberikan injeksi metylergometrin 1 amp intramuscular"
        ],
        answer: 1,
        explain: "Masase dulu."
      }
    ];

    startBtn.addEventListener("click", startQuiz);
    nextBtn.addEventListener("click", nextQuestion);

    function startQuiz() {
      homeEl.style.display = "none";
      quizEl.style.display = "block";
      current = 0;
      score = 0;
      answered = false;
      loadQuestion();
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function loadQuestion() {
      answered = false;
      explainEl.style.display = "none";
      explainEl.innerText = "";

      const q = questions[current];
      metaEl.innerText = "Soal " + (current + 1) + " dari " + questions.length;
      questionEl.innerText = q.q;

      currentOptions = q.options.map((opt, i) => {
        return {
          text: opt,
          isCorrect: i === q.answer
        };
      });

      shuffleArray(currentOptions);

      let html = "";
      currentOptions.forEach((opt, i) => {
        html += `
          <label>
            <input type="radio" name="opt" data-index="${i}">
            ${String.fromCharCode(65 + i)}. ${opt.text}
          </label>
        `;
      });

      optionsEl.innerHTML = html;

      const radios = optionsEl.querySelectorAll('input[name="opt"]');
      radios.forEach((radio) => {
        radio.addEventListener("change", function () {
          check(parseInt(this.dataset.index, 10));
        });
      });
    }

    function check(i) {
      if (answered) return;
      answered = true;

      const labels = optionsEl.querySelectorAll("label");

      labels.forEach((label, index) => {
        if (currentOptions[index].isCorrect) {
          label.classList.add("correct");
        }
        if (index === i && !currentOptions[index].isCorrect) {
          label.classList.add("wrong");
        }
      });

      if (currentOptions[i].isCorrect) {
        score++;
      }

      explainEl.style.display = "block";
      explainEl.innerText = "Penjelasan: " + questions[current].explain;
    }

    function nextQuestion() {
      if (!answered) return;

      current++;

      if (current < questions.length) {
        loadQuestion();
      } else {
        document.body.innerHTML = `
          <div class="container result">
            <h2>SELESAI</h2>
            <h3>Score: ${score}/${questions.length}</h3>
            <br>
            <button class="restart-btn" type="button" onclick="location.reload()">Restart</button>
          </div>
        `;
      }
    }
  </script>
</body>
</html>
