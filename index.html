    .restart-btn:hover,

    }

      flex-wrap: wrap;
      margin-bottom: 16px;
      color: var(--muted);

      padding: 8px 14px;
      border-radius: 999px;
    }

      font-size: 24px;
      line-height: 1.45;
      margin-bottom: 18px;

      gap: 12px;

      padding: 16px 18px;
      border: 2px solid #e5e7eb;
      border-radius: 16px;
      cursor: pointer;
      background: white;

      font-size: 16px;
      line-height: 1.5;

      border-color: #7dd3fc;
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(14, 165, 233, 0.1);
    }

    .options input {
      margin-right: 10px;
      transform: scale(1.1);
      accent-color: var(--secondary);
    }

    .correct {
      background: var(--success-bg) !important;
      border-color: var(--success-border) !important;
    }

    .wrong {
      background: var(--wrong-bg) !important;
      border-color: var(--wrong-border) !important;

      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 16px;
      background: var(--explain-bg);

      gap: 12px;

        answer: 1,

      },
      {

        options: [
          "Retrograde ejakulasi",
          "Androgen defisiensi",
          "Hilangnya jaringan prostat",
          "Obstruksi Duktus Ejaculatory",
          "Functional obstruction dari distal duktus seminalis"
        ],
        answer: 0,
        explain: "TURP paling sering menyebabkan ejakulasi retrograd karena gangguan mekanisme sfingter internal."
      },
      {
        q: "99. Manakah pernyataan dibawah ini benar tentang vas deferens?",
        options: [
          "Mukosa dilapisi oleh epitel kolumnar berlapis semu yang memiliki stereocilia, pada luarnya dilapisi oleh otot polos yang tebal dan jaringan ikat",
          "Mukosa dilapisi oleh epitel kolumnar yang memiliki cilia, pada luarnya dilapisi oleh otot polos yang tebal dan jaringan ikat",
          "Mukosa dilapisi oleh epitel transisional, pada luarnya dilapisi oleh otot polos yang tebal dan jaringan ikat",
          "Mukosa dilapisi oleh epitel kolumnar berlapis semu yang memiliki stereocilia, pada luarnya dilapisi oleh etet skelet yang tebal dan jaringan ikat",
          "Mukosa dilapisi oleh epitel berlapis kolumnar, pada luarnya dilapisi oleh otot polos yang tebal dan jaringan ikat"

        answer: 0,
        explain: "Ciri khas: stereocilia. Vas deferens: epitelnya sama dengan epididimis yaitu pseudostratified kolumnar (kolumnar berlapis semu) dengan stereosilia, yg panjang tapi gabisa gerak utk memperluas permukaan untuk maturasi sperma."
      },
      {
        q: "100. Laki-laki usia 56 tahun datang ke klinik andrology dengan keluhan ereksi berkurang secara berlahan mulai 1 tahun yang lalu. pemeriksaan fisik tinggi badan 165 cm, berat badan 90 Kg, lingkar perut 110 cm. Setelah dilakukan anamnesis lebih lanjut didapatkan bahwa pasien tidak memiliki fantasi seksual lebih dari 6 bulan terakhir. Apakah diagnosis klinis seksual pasien tersebut?",
        options: [
          "Hypoactive sexual desire disorder (HSDD)",

          "Disfungsi ereksi",
          "Late-onset hypogonadism (LOH)",
          "Priapismus"

        answer: 0,
        explain: "Tidak adanya fantasi atau keinginan seksual menetap lebih dari 6 bulan sesuai dengan HSDD."

    let current = 0;
    let currentOptions = [];
    let score = 0;
    let answered = false;
    let timeLeft = 100 * 60;
    let timerInterval = null;

    const homeEl = document.getElementById("home");
    const quizEl = document.getElementById("quizContainer");
    const metaEl = document.getElementById("meta");
    const scoreInfoEl = document.getElementById("scoreInfo");
    const timerInfoEl = document.getElementById("timerInfo");
    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const explainEl = document.getElementById("explain");
    const startBtn = document.getElementById("startBtn");
    const nextBtn = document.getElementById("nextBtn");
    const backBtn = document.getElementById("backBtn");

    const userAnswers = Array(questions.length).fill(null);

    startBtn.addEventListener("click", startQuiz);
    nextBtn.addEventListener("click", nextQuestion);
    backBtn.addEventListener("click", prevQuestion);

    function startQuiz() {
      homeEl.style.display = "none";
      quizEl.style.display = "block";
      current = 0;
      score = 0;
      answered = false;
      timeLeft = 100 * 60;
      userAnswers.fill(null);
      startTimer();
      loadQuestion();
    }

    function startTimer() {
      clearInterval(timerInterval);
      updateTimerDisplay();

      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          finishQuiz();
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const minutes = String(Math.floor(timeLeft / 60)).padStart(2, "0");
      const seconds = String(timeLeft % 60).padStart(2, "0");
      timerInfoEl.innerText = "Timer: " + minutes + ":" + seconds;
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function recalculateScore() {
      score = userAnswers.reduce((total, answer, index) => {
        return total + (answer === questions[index].answer ? 1 : 0);
      }, 0);

      scoreInfoEl.innerText = "Score: " + score;
    }

    function loadQuestion() {
      answered = userAnswers[current] !== null;
      explainEl.style.display = "none";
      explainEl.innerText = "";

      const q = questions[current];
      metaEl.innerText = "Soal " + (current + 1) + " / " + questions.length;
      questionEl.innerText = q.q;

      currentOptions = q.options.map((opt, i) => ({
        text: opt,
        isCorrect: i === q.answer,
        originalIndex: i
      }));

      shuffleArray(currentOptions);

      optionsEl.innerHTML = currentOptions.map((opt, i) => `
        <label>
          <input type="radio" name="opt" data-index="${i}">
          ${String.fromCharCode(65 + i)}. ${opt.text}
        </label>
      `).join("");

      const radios = optionsEl.querySelectorAll('input[name="opt"]');
      const labels = optionsEl.querySelectorAll("label");
      const savedAnswer = userAnswers[current];

      radios.forEach((radio) => {
        radio.addEventListener("change", function () {
          check(parseInt(this.dataset.index, 10));
        });
      });

      if (savedAnswer !== null) {
        const selectedIndex = currentOptions.findIndex(
          (opt) => opt.originalIndex === savedAnswer
        );

        if (selectedIndex !== -1) {
          radios[selectedIndex].checked = true;

          labels.forEach((label, index) => {
            const input = label.querySelector("input");
            input.disabled = true;

            if (currentOptions[index].isCorrect) {
              label.classList.add("correct");
            }

            if (index === selectedIndex && !currentOptions[index].isCorrect) {
              label.classList.add("wrong");
            }
          });

          explainEl.style.display = "block";
          explainEl.innerText = "Penjelasan: " + questions[current].explain;
        }
      }

      backBtn.disabled = current === 0;
      backBtn.style.opacity = current === 0 ? "0.6" : "1";

      recalculateScore();
    }

    function check(i) {
      const labels = optionsEl.querySelectorAll("label");
      const chosenOriginalIndex = currentOptions[i].originalIndex;

      const previousAnswer = userAnswers[current];
      userAnswers[current] = chosenOriginalIndex;
      answered = true;

      labels.forEach((label) => {
        label.classList.remove("correct", "wrong");
      });

      labels.forEach((label, index) => {
        const input = label.querySelector("input");
        input.disabled = true;

        if (currentOptions[index].isCorrect) {
          label.classList.add("correct");
        }

        if (index === i && !currentOptions[index].isCorrect) {
          label.classList.add("wrong");
        }
      });

      if (previousAnswer === null || previousAnswer !== chosenOriginalIndex) {
        recalculateScore();
      }

      explainEl.style.display = "block";
      explainEl.innerText = "Penjelasan: " + questions[current].explain;
    }

    function prevQuestion() {
      if (current > 0) {
        current--;
        loadQuestion();
      }
    }

    function nextQuestion() {
      if (!answered) return;

      current++;

      if (current < questions.length) {
        loadQuestion();
      } else {
        finishQuiz();
      }
    }

    function finishQuiz() {
      clearInterval(timerInterval);
      recalculateScore();

      document.body.innerHTML = `
        <div class="container result">
          <div class="result-box">
            <div class="badge">Quiz Selesai</div>
            <h2>Hasil Akhir</h2>
            <div class="score-number">${score}/${questions.length}</div>
            <p>Semoga CBT juga lancar ya! Exc33ding A!</p>
            <button class="restart-btn" type="button" onclick="location.reload()">Restart</button>
          </div>
        </div>
      `;
    }
  </script>
