function startQuiz(){
document.getElementById("home").style.display="none";
document.getElementById("quizContainer").style.display="block";
loadQuestion();
}

function loadQuestion(){
answered=false;
document.getElementById("explain").style.display="none";

let q = questions[current];
document.getElementById("question").innerText = q.q;

let html="";
q.options.forEach((opt,i)=>{
html+=`
<label>
<input type="radio" name="opt" onclick="check(${i})">
${String.fromCharCode(65+i)}. ${opt}
</label>`;
});
document.getElementById("options").innerHTML=html;
}

function check(i){
if(answered) return;
answered=true;

let q = questions[current];
let labels=document.querySelectorAll("label");

labels.forEach((l,index)=>{
if(index==q.answer) l.classList.add("correct");
if(index==i && i!=q.answer) l.classList.add("wrong");
});

if(i==q.answer) score++;

document.getElementById("explain").style.display="block";
document.getElementById("explain").innerText="Penjelasan: "+q.explain;
}

function next(){
current++;
if(current<questions.length){
loadQuestion();
}else{
document.body.innerHTML=`<h2 style="text-align:center;">SELESAI 🎉<br>Score: ${score}/${questions.length}</h2>`;
}
}
